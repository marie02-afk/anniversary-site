<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    html, body {
      height: auto;
      min-height: 100%;
      overflow-y: auto;
    }

    body {
      color: white;

      background: url("bg.jpg") no-repeat center center;
      background-size: cover;
      background-attachment: fixed;

      padding: 20px;
    }

    /* DARK OVERLAY so text is ALWAYS visible */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;

      background: rgba(0, 0, 0, 0.75);
      padding: 20px;
      border-radius: 15px;

      width: 90%;
      max-width: 400px;

      margin: 40px auto;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      margin-bottom: 15px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 20px;
      }

      p {
        font-size: 14px;
      }

      .container {
        margin: 20px auto;
      }
    }
  </style>
</head>

<body>
  <div id="box" onclick="showMessage()">
        Click me 💌
    </div>

    <div id="message">
        Dear lovelove,<br><br>
        Happy 1st anniversary po! I'm so happy na inabot kit sini na punto...
        Thank you for always making me feel loved. I love you so much 💞
    </div>
</div>

<script>
function showMessage() {
    document.getElementById("message").style.display = "block";
    createHeartsBurst();
}

/* 💖 floating hearts generator */
function createHeart() {
    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.classList.add("heart-float");

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    heart.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}

setInterval(createHeart, 500);

/* 💥 burst hearts when clicked */
function createHeartsBurst() {
    for (let i = 0; i < 15; i++) {
        setTimeout(createHeart, i * 100);
    }
}
</script>

  <div class="container">
    <h1>🎉</h1>
    <p>si lovelove man ini hehe</p>

    <audio controls>
      <source src="song.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>
  </div>

</body>
</html>
