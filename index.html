<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  color: white;
  background: url("bg.jpg") no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  padding: 20px;
}

/* dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  background: rgba(0,0,0,0.75);
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
  text-align: center;
}

/* BUTTON */
button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4081;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

/* ENVELOPE */
.envelope {
	width: 250px;
	height: 150px;
	background: #ffcdd2;
	margin: 30px auto;
	position: relative;
	cursor: pointer;

	border: 2px solid #e91e63;
	box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3)
}

/* top triangle (flap) */
.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 125px solid transparent;
  border-right: 125px solid transparent;
  border-bottom: 75px solid #e91e63;
  top: -75px;
  transition: 0.5s;
}

.open .flap {
  transform: rotateX(180deg);
}

.flap {
	transform-origin: top;
}

/* letter inside */
. envelope: :after {
	content: "";
	position: absolute;
	width: 90%;
	height: 80%;
	background: white;
	top: 10%;
	left: 5%;
	border-radius: 5px;
}

/* MESSAGE */
#message {
  max-height: 0;
  overflow: hidden;
  transition: max-height 1s ease;
}

#message.show {
  max-height: 300px;
}

#letter {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;

  transform: translateY(50px);
  opacity: 0;
  transition: all 1s ease;
}

#message.show #letter {
  transform: translateY(0);
  opacity: 1;
}

.show {
  display: block;
}

/* floating hearts */
.heart-float {
  position: fixed;
  bottom: -10px;
  animation: floatUp random forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Happy Anniversary lovey 🎉</h1>
  <p>Click play first, then open your surprise 💖</p>

  <!-- MUSIC -->
  <audio id="music" src="song.mp3"></audio>
  <button onclick="toggleMusic()">▶ Play Music</button>

  <!-- ENVELOPE -->
  <div class="envelope" id="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
  </div>

  <!-- MESSAGE -->
  <div id="message">
	  <div id="lettter"></div>
  </div>
	
  <!-- RESET -->
  <button onclick="resetEnvelope()">Reset</button>
</div>

<script>
let isPlaying = false;

function toggleMusic() {
  const music = document.getElementById("music");
  const btn = event.target;

  if (!isPlaying) {
    music.play();
    btn.textContent = "⏸ Pause Music";
  } else {
    music.pause();
    btn.textContent = "▶ Play Music";
  }

  isPlaying = !isPlaying;
}

function openEnvelope() {
  document.getElementById("envelope").classList.add("open");
  document.getElementById("message").classList.add("show");
  	createHeartsBurst();

	typeLetter(); // 👈 start typing
}

const text = `Dear lovelove,

Happy 1st anniversary po! I'm so happy na inabot kit sini na punto saat na duha despite all our mishaps...

Alala ko pa ito early days nato, ka-awkward ta na duha, wray gud masyado topic tas masteal la kit glances from each other.

Alala ko liwat ito mga naglalakaw la kit tapos nagiinistorya la kit biskan nano, danay chismis ko, danay imo mga uyag, 
danay ato, danay at future, tas damo-damo la. Tas kadamo gud fr saat away, diko na maihap. 
Tikang sito mga selos-selos tas ito disagreements nato pero maupay nga nagccommunicate regardless saat difference.

Tapos igeend nato at away sa mahigpit na hug tas intimate na kiss. 
Mali la kit parehas sa mga romantic novels hehe. Tapos wra ta naman la namalayan na adi na kit. 
All things just went on its on.

Love, thank you for always making me feel loved. 
Thank you for always caring for me. Thank you for the time and effort na gingugol mo saakon. 
Thank 	you for ALL THE PATIENCE na ginlaan mo saak despite saak pagiging madumoton.. 

Thank you so much Lordy sa lahat. 

Neither this letter nor anything could ever describe how grateful I am to you and how much love I have for you...

I love you so so much po 💞 and I am hopeful na what we share would last a lifetime...

Happy Anniversary <33`;

let index = 0;

function typeLetter() {
  const letter = document.getElementById("letter");
  letter.innerHTML = ""; // reset
  index = 0;

  function type() {
    if (index < text.length) {
      letter.innerHTML += text.charAt(index) === "\n" ? "<br>" : text.charAt(index);
      index++;
      setTimeout(type, 30); // speed (lower = faster)
    }
  }

  type();
}
	
function resetEnvelope() {
  document.getElementById("envelope").classList.remove("open");
  document.getElementById("message").classList.remove("show");
}

/* floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.classList.add("heart-float");

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  heart.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 8000);
}

setInterval(createHeart, 500);

function createHeartsBurst() {
  for (let i = 0; i < 15; i++) {
    setTimeout(createHeart, i * 100);
  }
}
</script>

</body>
</html>
