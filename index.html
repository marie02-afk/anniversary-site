<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: url("bg.jpg") center/cover fixed;
  overflow-x: hidden;
}

/* overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 420px;
  margin: 40px auto;
  background: rgba(0,0,0,0.75);
  padding: 20px;
  border-radius: 15px;
}

/* buttons */
button {
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #ff4081;
  color: white;
  margin: 8px;
  cursor: pointer;
}

/* envelope */
.envelope {
  width: 250px;
  height: 150px;
  margin: 25px auto;
  background: #ffcdd2;
  position: relative;
  cursor: pointer;
  border-radius: 5px;
}

/* flap (stable triangle) */
.flap {
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 125px solid transparent;
  border-right: 125px solid transparent;
  border-top: 75px solid #e91e63;
  transform-origin: top;
  transition: 0.5s;
}

/* flap open */
.envelope.open .flap {
  transform: rotateX(180deg);
}

/* letter box */
#message {
  display: none;
  margin-top: 20px;
}

#message.show {
  display: block;
}

#letter {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  min-height: 120px;
  white-space: pre-wrap;
}

/* hearts */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp linear forwards;
  z-index: 1;
}

@keyframes floatUp {
  from {
    transform: translateY(0);
    opacity: 1;
  }
  to {
    transform: translateY(-120vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>Happy Anniversary 💖</h2>

<audio controls>
      <source src="song.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>

<div class="envelope" onclick="openEnvelope()">
  <div class="flap"></div>
</div>

<div id="message">
  <div id="letter"></div>
</div>

<button onclick="resetAll()">Reset</button>

</div>

<script>
let musicPlaying = false;

function toggleMusic() {
  const music = document.getElementById("music");

  if (!musicPlaying) {
    music.play();
    musicPlaying = true;
  } else {
    music.pause();
    musicPlaying = false;
  }
}

/* ENVELOPE OPEN */
function openEnvelope() {
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("message").classList.add("show");

  startTyping();
}

/* RESET */
function resetAll() {
  document.querySelector(".envelope").classList.remove("open");
  document.getElementById("message").classList.remove("show");
  document.getElementById("letter").innerHTML = "";
}

/* TYPEWRITER */
const text = `Dear lovelove,

Happy 1st anniversary 💖
I love you so much <33`;

let i = 0;

function startTyping() {
  const el = document.getElementById("letter");
  el.innerHTML = "";
  i = 0;

  function type() {
    if (i < text.length) {
      el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
      i++;
      setTimeout(type, 25);
    }
  }

  type();
}

/* HEARTS */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  heart.style.animationDuration = (3 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
